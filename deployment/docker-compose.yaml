services:
  postgres:

    image: postgres:13-alpine

    container_name: driver-postgres

    environment:
      POSTGRES_DB: driverdb
      POSTGRES_USER: driver
      POSTGRES_PASSWORD: driver

    ports:
      - "5432:5432"

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fleet

  driver-ms:
    image: "fleet-platform/driver-service:1.0"
    container_name: "driver-ms"
    ports:
      - 8080:8080
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GRPC_CLIENT_HOST: telemetry-ms
      GRPC_CLIENT_PORT: 12242
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/driverdb
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - fleet

  telemetry-ms:
    image: "fleet-platform/telemetry-service:1.0"
    container_name: "telemetry-ms"
    ports:
      - 12242:12242
    deploy:
      resources:
        limits:
          memory: 700m
    environment:
      GRPC_SERVER_PORT: 12242
    networks:
      - fleet

networks:
  fleet:
    driver: bridge