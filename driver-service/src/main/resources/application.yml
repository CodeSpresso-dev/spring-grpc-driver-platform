server:
  port: 8080

spring:
  application:
    name: driver-service
  jpa:
    hibernate:
      ddl-auto: create-drop
  datasource:
    url: jdbc:postgresql://localhost:5432/driverdb
    username: driver
    password: driver

  flyway:
    enabled: true

grpc:
  client:
      host: localhost
      port: 12242

resilience4j:

  circuitbreaker:
    instances:
      telemetryGrpc:
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        slidingWindowSize: 10

  retry:
    instances:
      telemetryGrpc:
        maxAttempts: 3
        waitDuration: 500ms