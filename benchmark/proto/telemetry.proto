syntax = "proto3";

package telemetry;

option java_multiple_files = true;

option java_package =
    "io.github.mshivaeifar.telemetryservice.grpc";

option java_outer_classname =
    "TelemetryProto";

message GetDriverLocationRequest {

  string driver_id = 1;

}

message GetDriverLocationResponse {

  string driver_id = 1;

  double latitude = 2;

  double longitude = 3;

  string timestamp = 4;

}

service TelemetryService {

  rpc GetDriverLocation(
      GetDriverLocationRequest
      ) returns (
      GetDriverLocationResponse
      );

}